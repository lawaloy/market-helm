name: Dependency Maintenance Auto Finish

on:
  workflow_run:
    # PR E2E (Curl + Playwright) is a required merge check on main — see GitHub ruleset "Merging".
    workflows: ["CI", "PR Description", "CodeQL Advanced", "PR E2E"]
    types: [completed]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: maintenance-auto-finish-${{ github.event.workflow_run.pull_requests[0].number || github.event.workflow_run.id }}
  cancel-in-progress: true

jobs:
  finish:
    if: |
      github.event.workflow_run.event == 'pull_request' &&
      github.event.workflow_run.conclusion == 'success'
    uses: ./.github/workflows/pr-auto-finish-reusable.yml
    with:
      lane: maintenance
      poll_profile: after_checks
    secrets: inherit
