name: PR Auto Finish Reusable

on:
  workflow_call:
    inputs:
      lane:
        required: true
        type: string
      pull_number:
        required: false
        type: number
        default: 0
      poll_profile:
        required: false
        type: string
        default: "default"

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  finish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      - name: Merge PR when ready
        uses: actions/github-script@v7
        env:
          LANE: ${{ inputs.lane }}
          PULL_NUMBER: ${{ inputs.pull_number }}
          POLL_PROFILE: ${{ inputs.poll_profile }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const finish = require('./.github/scripts/pr-auto-finish.cjs');
            return finish({ github, context, core });
