# Advanced CodeQL (custom workflow). Requires GitHub **default** CodeQL setup to stay OFF:
#   Repo → Settings → Code security → Code scanning → disable "Default" / use this workflow only.
# If both default and this workflow upload SARIF, analysis fails with:
#   "CodeQL analyses from advanced configurations cannot be processed when the default setup is enabled"
#
# https://docs.github.com/en/code-security/code-scanning/creating-an-advanced-setup-for-code-scanning

name: CodeQL Advanced

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "35 5 * * 1"
  workflow_dispatch:

permissions:
  security-events: write
  packages: read
  actions: read
  contents: read

concurrency:
  group: codeql-advanced-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript, python, actions]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          config-file: .github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:${{ matrix.language }}"
